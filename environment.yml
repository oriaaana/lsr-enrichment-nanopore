name: nanopore
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - minimap2=2.26
  - samtools=1.17
  - fastqc
  - nanoplot
  - pysam
  - pandas
  - numpy
  - biopython
